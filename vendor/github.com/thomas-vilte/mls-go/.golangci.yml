version: "2"

linters:
  default: none
  enable:
    # --- correctness ---
    - govet          # official go vet checks
    - errcheck       # unhandled errors
    - staticcheck    # SA/S/QF checks (staticcheck.io)
    - ineffassign    # assignments whose result is never used
    - unused         # unused code (vars, funcs, types)
    - bodyclose      # http response body not closed
    - nilerr         # returning nil when error is non-nil (and vice versa)
    - noctx          # http requests without context

    # --- style / idiomatic Go ---
    - revive         # golint successor: naming, style, best practices
    - gocritic       # opinionated checks: appendAssign, sloppyReassign, etc.
    - misspell       # spelling mistakes in comments and strings
    - whitespace     # unnecessary blank lines at start/end of blocks

    # --- security (relevant for a crypto library) ---
    - gosec          # security issues: weak crypto, hardcoded secrets, etc.

  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck  # allow e.g. ciphersuite.CipherSuite
        - name: var-naming
        - name: error-return
        - name: error-strings
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: time-naming
        - name: unexported-return
        - name: unused-parameter

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam      # false positives on intentional value copies
        - rangeValCopy   # same

    gosec:
      excludes:
        - G115  # integer overflow on conversions (too noisy for wire format code)

    godot:
      scope: declarations  # only exported declarations, not all comments

formatters:
  enable:
    - gofmt       # standard formatter
    - goimports   # gofmt + import grouping

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # test files get a bit more slack
    - path: '_test\.go'
      linters:
        - errcheck
        - gosec
        - godot
